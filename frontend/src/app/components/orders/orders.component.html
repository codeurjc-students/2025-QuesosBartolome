<div class="orders-container">

  <h1>Pedidos</h1>

  <div class="orders-card">

    <!-- HEADER -->
    <div class="orders-header header-highlight">
      <span>#</span>
      <span>Usuario</span>
      <span>Fecha</span>
      <span>Items</span>
      <span>Peso</span>
      <span>Total</span>
      <span></span>
    </div>

    <!-- ROWS -->
    <div class="orders-row" *ngFor="let order of orders" (click)="processOrder(order.id)">
      <span>{{ order.id }}</span>
      <span>{{ order.user.name }}</span>
      <span>{{ order.orderDate | date:'dd/MM/yyyy' }}</span>
      <span class="badge">{{ order.items.length }}</span>
      <span class="badge">{{ order.totalWeight | number:'1.2-2' }} Kg</span>
      <span class="badge">€{{ order.totalPrice | number:'1.2-2' }}</span>
      <button class="btn-process" *ngIf="isAdmin(); else userStatus" (click)="onOrderAction(order, $event)">
        Procesar
      </button>
      <ng-template #userStatus>
        <span class="status-tag" [class.status-processed]="order.processed" [class.status-pending]="!order.processed">
          {{ getOrderStatus(order) }}
        </span>
      </ng-template>
    </div>

  </div>

  <!-- PAGINACIÓN -->
  <div class="pagination" *ngIf="totalPages > 0">
    <button class="arrow" [disabled]="currentPage === 0" (click)="prevPage()">‹</button>
    <span class="page-number">{{ currentPage + 1 }}</span>
    <button class="arrow" [disabled]="currentPage >= totalPages - 1" (click)="nextPage()">›</button>
  </div>

</div>
