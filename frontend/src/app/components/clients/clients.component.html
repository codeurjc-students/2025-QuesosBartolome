<div class="users-container">

  <h1>Clientes</h1>

  <div class="users-card">


    <div class="users-header header-highlight">
      <span>id</span>
      <span></span>
      <span>Nombre</span>
      <span>Email</span>
      <span>Dirección</span>
      <span>NIF</span>
      <span>Estado</span>
      <span></span>
    </div>

    <div class="users-row" [class.user-banned]="user.banned" (click)="goToUserProfile(user.id)" *ngFor="let user of users; let i = index">
      <span>{{ user.id }}</span>

      <img
        class="avatar"
        [class.avatar-banned]="user.banned"
        [src]="getUserImageUrl(user.id)"
        alt="avatar"
      />

      <span>{{ user.name }}</span>
      <span>{{ user.gmail }}</span>
      <span>{{ user.direction }}</span>
      <span>{{ user.nif }}</span>

      <span>
        <span class="status-pill" [class.status-pill-banned]="user.banned">
          {{ user.banned ? 'BANEADO' : 'ACTIVO' }}
        </span>
      </span>

      <button class="btn-ban" [class.btn-unban]="user.banned" (click)="$event.stopPropagation(); banUser(user)">
        {{ user.banned ? 'Desbanear' : 'Banear' }}
      </button>
    </div>

  </div>

  <div class="pagination" *ngIf="totalPages > 0">
    <button class="arrow" [disabled]="currentPage === 0" (click)="prevPage()">‹</button>
    <span class="page-number">{{ currentPage + 1 }}</span>
    <button class="arrow" [disabled]="currentPage >= totalPages - 1" (click)="nextPage()">›</button>
  </div>

</div>
